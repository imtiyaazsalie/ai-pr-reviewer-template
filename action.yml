name: "AI PR Reviewer"
description: "Automatically review pull requests using DeepSeek AI with inline comments and summary"
author: "imtiyaazsalie"

inputs:
  deepseek_api_key:
    description: "DeepSeek API key"
    required: true
  github_token:
    description: "GitHub token for posting comments"
    required: true
  config_path:
    description: "Path to monorepo config (relative to repo root), e.g. .github/ai-reviewer.yml"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Install action dependencies
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}

    - name: Check cache
      id: cache_check
      shell: bash
      run: node ${{ github.action_path }}/src/cache/cache.js && echo "cached=true" || echo "cached=false"
      continue-on-error: true
      env:
        GITHUB_SHA: ${{ github.sha }}

    - name: Analyze diff
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/analyzer/diffAnalyzer.js
      env:
        GITHUB_BASE_REF: ${{ github.base_ref }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}

    - name: Build chunks
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/analyzer/hunkSplitter.js

    - name: AI Pass 1 (detect issues)
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/ai/pass1.js
      env:
        DEEPSEEK_API_KEY: ${{ inputs.deepseek_api_key }}

    - name: AI Pass 2 (validate & deduplicate)
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/ai/pass2.js
      env:
        DEEPSEEK_API_KEY: ${{ inputs.deepseek_api_key }}

    - name: Risk scoring
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/scoring/risk.js

    - name: Post inline reviews
      shell: bash
      run: node ${{ github.action_path }}/src/github/reviews.js
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF: ${{ github.ref }}

    - name: Post summary comment
      shell: bash
      run: node ${{ github.action_path }}/src/github/comments.js
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_REF: ${{ github.ref }}

    - name: Save cache
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/cache/cache.js --save
      env:
        GITHUB_SHA: ${{ github.sha }}
