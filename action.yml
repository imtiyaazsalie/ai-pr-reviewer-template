name: "AI PR Reviewer"
description: "Automatically review pull requests using DeepSeek AI with inline comments and summary"
author: "imtiyaazsalie"

inputs:
  deepseek_api_key:
    description: "DeepSeek API key"
    required: true
  github_token:
    description: "GitHub token for posting comments (defaults to secrets.GITHUB_TOKEN)"
    required: false
    default: ${{ github.token }}
  config_path:
    description: "Path to monorepo config (relative to repo root), e.g. .github/ai-reviewer.yml"
    required: false
    default: ""
  max_concurrency:
    description: "Maximum concurrent AI calls (default 5, lower if hitting rate limits)"
    required: false
    default: "5"
  enable_semgrep:
    description: "Run Semgrep static analysis alongside AI review"
    required: false
    default: "false"

runs:
  using: "composite"
  steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "18"

    - name: Cache action node_modules
      uses: actions/cache@v4
      id: npm_cache
      with:
        path: ${{ github.action_path }}/node_modules
        key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
        restore-keys: ${{ runner.os }}-npm-

    - name: Install action dependencies
      if: steps.npm_cache.outputs.cache-hit != 'true'
      shell: bash
      run: npm ci
      working-directory: ${{ github.action_path }}

    - name: Check cache
      id: cache_check
      shell: bash
      run: node ${{ github.action_path }}/src/cache/cache.js
      continue-on-error: true
      env:
        GITHUB_SHA: ${{ github.sha }}

    - name: Analyze diff
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/analyzer/diffAnalyzer.js
      env:
        GITHUB_BASE_REF: ${{ github.base_ref }}
        GITHUB_HEAD_REF: ${{ github.head_ref }}
        CONFIG_PATH: ${{ inputs.config_path }}

    - name: Build chunks
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/analyzer/hunkSplitter.js

    - name: AI Pass 1 (detect issues)
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: |
        node ${{ github.action_path }}/src/ai/pass1.js || {
          echo '[]' > pass1.json
          echo '⚠️ Pass 1 failed — continuing with empty results'
        }
      env:
        DEEPSEEK_API_KEY: ${{ inputs.deepseek_api_key }}
        MAX_CONCURRENCY: ${{ inputs.max_concurrency }}

    - name: AI Pass 2 (validate & deduplicate)
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: |
        node ${{ github.action_path }}/src/ai/pass2.js || {
          echo '[]' > final.review.json
          echo '⚠️ Pass 2 failed — continuing with empty results'
        }
      env:
        DEEPSEEK_API_KEY: ${{ inputs.deepseek_api_key }}

    - name: Semgrep static analysis
      if: steps.cache_check.outcome != 'success' && inputs.enable_semgrep == 'true'
      continue-on-error: true
      uses: returntocorp/semgrep-action@v1
      with:
        config: auto

    - name: Merge Semgrep results
      if: steps.cache_check.outcome != 'success' && inputs.enable_semgrep == 'true'
      shell: bash
      run: node ${{ github.action_path }}/src/utils/mergeStatic.js
      continue-on-error: true

    - name: Risk scoring
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: |
        node ${{ github.action_path }}/src/scoring/risk.js || {
          echo '{"score":0,"level":"LOW","addedLines":0}' > risk.json
          echo '⚠️ Risk scoring failed — using defaults'
        }

    - name: Post inline reviews
      shell: bash
      run: node ${{ github.action_path }}/src/github/reviews.js
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}

    - name: Post summary comment
      shell: bash
      run: node ${{ github.action_path }}/src/github/comments.js
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        PR_NUMBER: ${{ github.event.pull_request.number }}

    - name: Save cache
      if: steps.cache_check.outcome != 'success'
      shell: bash
      run: node ${{ github.action_path }}/src/cache/cache.js --save
      continue-on-error: true
      env:
        GITHUB_SHA: ${{ github.sha }}
